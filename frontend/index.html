<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link href="https://day.awscommunity.mx/assets/images/favicon.png" rel="icon" type="image/svg+xml" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AWS Community Day Argentina 2025</title>
    <script>
        // Función para establecer una cookie
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/";
        }

        // Función para obtener una cookie
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        // Inicializa el agente en la carga de la página.
        const fpPromise = import("https://fpjscdn.net/v4/MeRNGT1Oa7JGN5TDflZm")
            .then(Fingerprint => Fingerprint.start({ region: "us" }));

        fpPromise
            .then(fp => {
                let visitorId = getCookie('visitorId');

                if (visitorId) {
                    console.log('visitorId obtenido de cookie:', visitorId);
                    return visitorId;
                }

                return fp.get().then(result => {
                    visitorId = result.visitor_id;

                    setCookie('visitorId', visitorId, 30);

                    console.log('Nuevo visitorId:', visitorId);
                    console.log('event_id:', result.event_id);

                    return visitorId;
                });
            })
            .then(visitorId => {
                console.log('visitorId final:', visitorId);

                // Si tu frontend necesita usarlo después:
                window.visitorId = visitorId;
            })
            .catch(error => {
                console.error('Error Fingerprint:', error);
            });
    </script>
</head>

<body>
    <div id="root"></div>
    <script src="/src/main.tsx" type="module"></script>
</body>

</html>
